name: "Create env file"

on:
  push:
    branches:
      - main

  # schedule:
  #   # * is a special character in YAML so you have to quote this string
  #   - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  create_env_file:
    runs-on: ubuntu-latest
    steps:
      - name: Create .env file
        uses: ozaytsev86/create-env-file@v1
        with:
          MONGODB_DATA_API_KEY: ${{ secrets.MONGODB_DATA_API_KEY }}
