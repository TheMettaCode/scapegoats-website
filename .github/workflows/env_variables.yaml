name: Create envfile

on: [push]

jobs:
  create-envfile:
    runs-on: ubuntu-latest

    steps:
      - name: Make envfile
        uses: SpicyPizza/create-envfile@v1.3
        with:
          # envkey_DEBUG: false
          # envkey_SOME_API_KEY: "123456abcdef"
          envkey_SECRET_KEY: ${{ secrets.MONGODB_DATA_API_KEY }}
          some_other_variable: foobar
          directory: assets/
          file_name: .env
          fail_on_empty: false
